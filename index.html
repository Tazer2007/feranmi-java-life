<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator with Theme Switcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-1">
    <div class="calculator">
        <div class="header">
            <h2>calc</h2>
            <div class="theme-switcher">
                <p>THEME</p>
                <div class="switcher">
                    <div class="numbers">
                        <span>1</span>
                        <span>2</span>
                        <span>3</span>
                    </div>
                    <input type="range" min="1" max="3" value="1" id="theme-slider">
                </div>
            </div>
        </div>
        
        <div class="screen" id="screen">0</div>
        
        <div class="button">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="del">DEL</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>

            <button>.</button>
            <button>0</button>
            <button>/</button>
            <button>*</button>

            <button class="reset">Reset</button>
            <button class="equalto">=</button>
        </div>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
